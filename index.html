<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabTamer | Project Pomo-mon MVP (Sprint 5.1)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --neon-green: #39ff14;
            --neon-red: #ff3333;
            --text-main: #e6edf3;
            --text-muted: #8b949e;

            /* SPRITE MATH */
            --frame-width: 118px; 
            --frame-height: 120px;

            /* GBA PALETTE */
            --gba-mint: #98d8b8;
            --gba-blue: #70a8a8;
            --gba-dark-teal: #385858;
            --gba-border: #405040;
            --gba-selected: #f8d030;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; overflow-x: hidden;
        }

        .container {
            background-color: var(--panel-bg); border: 1px solid #30363d;
            border-radius: 12px; padding: 1.5rem; width: 95%;
            max-width: 450px; text-align: center; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        /* --- DYNAMIC SPRITE ANIMATION ENGINE --- */
        .sprite-viewport {
            width: var(--frame-width);
            height: var(--frame-height);
            background-repeat: no-repeat;
            background-position: 0px 0px;
            background-size: calc(var(--frame-width) * 4) var(--frame-height);
            filter: drop-shadow(0 0 10px rgba(57, 255, 20, 0.3));
            margin: 0 auto;
            image-rendering: pixelated;
            animation: play-sprite 0.8s steps(4) infinite;
        }

        @keyframes play-sprite {
            100% { background-position: calc(var(--frame-width) * -4) 0px; }
        }

        /* --- UI COMPONENTS --- */
        .hp-wrapper { margin-bottom: 1rem; text-align: left; }
        .hp-labels { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .hp-bar-container { width: 100%; height: 16px; background-color: #21262d; border: 2px solid #30363d; border-radius: 8px; overflow: hidden; }
        #hp-fill { height: 100%; width: 100%; background-color: var(--neon-green); transition: width 0.4s ease; }

        .auth-input { width: 100%; padding: 0.8rem; margin-bottom: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; }
        .nav-bar { display: none; gap: 10px; margin-bottom: 1rem; justify-content: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-btn { background: none; color: var(--text-muted); border: none; cursor: pointer; font-weight: bold; padding: 5px 10px; }
        .nav-btn.active { color: var(--neon-green); border-bottom: 2px solid var(--neon-green); }

        .timer-display { font-size: 3.5rem; font-weight: bold; font-family: monospace; margin: 0.5rem 0; }
        button { padding: 0.8rem 1.2rem; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; text-transform: uppercase; }
        
        #start-btn { background: var(--neon-green); color: black; width: 60%; }
        #give-up-btn { background: transparent; color: var(--neon-red); border: 1px solid var(--neon-red); width: 35%; }

        /* --- RETRO GBA FARM SECTION --- */
        #farm-section {
            background-color: var(--gba-mint);
            border: 4px double var(--gba-border);
            padding: 10px;
            color: var(--gba-dark-teal);
            font-family: 'Courier New', Courier, monospace;
            border-radius: 4px;
        }

        .gba-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 4px;
            background: rgba(255,255,255,0.2);
            padding: 5px;
            border: 2px inset var(--gba-blue);
        }

        .gba-cell {
            aspect-ratio: 1/1;
            background: var(--gba-blue);
            border: 1px solid var(--gba-dark-teal);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .gba-cell.selected { border: 3px solid var(--gba-selected); box-shadow: inset 0 0 5px orange; }
        
        .gba-mini-sprite {
            width: 40px; height: 40px;
            background-size: 160px 40px;
            background-repeat: no-repeat;
            image-rendering: pixelated;
        }

        .gba-summary-panel { margin-top: 10px; background: var(--gba-blue); border: 2px solid var(--gba-dark-teal); padding: 10px; text-align: left; font-size: 0.8rem; }
        .gba-btn-group { display: flex; gap: 5px; margin-top: 8px; }
        .gba-btn { flex: 1; padding: 5px; border: 2px solid var(--gba-dark-teal); background: #eee; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .gba-btn:active { background: #ccc; }

        /* Egg Selection */
        .egg-container { display: flex; justify-content: space-around; margin: 20px 0; }
        .egg-btn { background: #21262d; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 10px; cursor: pointer; border-radius: 8px; flex:1; margin:0 5px; }

        /* Modal */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:9999; }
        .modal-overlay.active { display: flex; }
        #mobile-debug { background: #39ff14; color: black; padding: 5px; font-size: 10px; position: fixed; top: 0; width: 100%; z-index: 10000; text-align: center; }
    </style>
</head>
<body>

    <div id="mobile-debug">System Status: V5.1 Bugfixes Deployed</div>

    <div class="container">
        <h1>TabTamer</h1>

        <div id="login-section">
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1.5rem;">Join the Pomo-mon Trainers</p>
            <input type="email" id="email-input" class="auth-input" placeholder="Email">
            <input type="password" id="password-input" class="auth-input" placeholder="Password">
            <div style="display:flex; gap:10px;">
                <button id="login-btn" style="background:var(--neon-green); flex:1;">Log In</button>
                <button id="signup-btn" style="border:1px solid var(--neon-green); color:var(--neon-green); background:transparent; flex:1;">Signup</button>
            </div>
        </div>

        <div id="egg-selection" style="display: none;">
            <h3>Pick your starter egg!</h3>
            <div class="egg-container">
                <button class="egg-btn" onclick="claimStarter(1)">🔥<br>FIRE</button>
                <button class="egg-btn" onclick="claimStarter(4)">💧<br>WATER</button>
                <button class="egg-btn" onclick="claimStarter(7)">🌿<br>GRASS</button>
            </div>
        </div>

        <div id="nav-bar" class="nav-bar">
            <button id="nav-arena" class="nav-btn active">ARENA</button>
            <button id="nav-farm" class="nav-btn">FARM</button>
        </div>

        <div id="game-section" style="display: none;">
            <div class="hp-wrapper">
                <div class="hp-labels"><span>HP</span><span id="hp-text">100 / 100</span></div>
                <div class="hp-bar-container"><div id="hp-fill"></div></div>
            </div>

            <div id="sprite-renderer" style="min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center;"></div>

            <div style="margin-top: 5px; font-size: 0.8rem;">
                Focus (Mins): <input type="number" id="time-input" value="25" min="1" style="background:#0d1117; color:var(--neon-green); border:1px solid #333; width:50px;">
            </div>

            <div class="timer-display" id="timer">25:00</div>

            <div style="display: flex; justify-content: space-between;">
                <button id="start-btn">Start Session</button>
                <button id="give-up-btn">Give Up</button>
            </div>
        </div>
        
        <div id="farm-section" style="display:none;">
            <h4 style="margin-bottom:8px;">POMO-MON STORAGE</h4>
            <div id="gba-grid" class="gba-grid">
                </div>
            
            <div id="gba-summary" class="gba-summary-panel">
                <div id="summary-content">Select a Pomo-mon...</div>
                <div class="gba-btn-group">
                    <button class="gba-btn" id="gba-equip-btn" style="display:none;">EQUIP</button>
                    <button class="gba-btn" id="gba-cancel-btn">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="penalty-modal">
        <div style="background:#000; padding:2rem; border:2px solid var(--neon-red); border-radius:12px; text-align:center;">
            <h2 style="color:var(--neon-red);">TAB SWITCHED!</h2>
            <p style="margin: 15px 0;">Your Pomo-mon took 15 damage!</p>
            <button id="resume-btn" style="background:var(--neon-red); color:white; width:100%;">Resume Focus</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABCxcL0uRz_ypOjjCb_lsft0AWOTO--Ls",
            authDomain: "pomo-mon.firebaseapp.com",
            projectId: "pomo-mon",
            storageBucket: "pomo-mon.firebasestorage.app",
            messagingSenderId: "273551072268",
            appId: "1:273551072268:web:7d5650f2b3b877c4702229"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- THE POMODEX (17 Families, 3 Stages) ---
        const POMODEX = [
            // 1. Fire
            { id: 1, name: "Emberling", nextEvolutionId: 2, evolutionXpThreshold: 500 },
            { id: 2, name: "Flarehound", nextEvolutionId: 3, evolutionXpThreshold: 2000 },
            { id: 3, name: "Infernox", nextEvolutionId: null, evolutionXpThreshold: null },
            // 2. Water
            { id: 4, name: "Splashy", nextEvolutionId: 5, evolutionXpThreshold: 500 },
            { id: 5, name: "Riverun", nextEvolutionId: 6, evolutionXpThreshold: 2000 },
            { id: 6, name: "Tsunamiath", nextEvolutionId: null, evolutionXpThreshold: null },
            // 3. Grass
            { id: 7, name: "Seedling", nextEvolutionId: 8, evolutionXpThreshold: 500 },
            { id: 8, name: "Vineguard", nextEvolutionId: 9, evolutionXpThreshold: 2000 },
            { id: 9, name: "Forestking", nextEvolutionId: null, evolutionXpThreshold: null },
            // 4. Electric
            { id: 10, name: "Sparky", nextEvolutionId: 11, evolutionXpThreshold: 500 },
            { id: 11, name: "Voltstrike", nextEvolutionId: 12, evolutionXpThreshold: 2000 },
            { id: 12, name: "Thunderlord", nextEvolutionId: null, evolutionXpThreshold: null },
            // 5. Stone
            { id: 13, name: "Pebble", nextEvolutionId: 14, evolutionXpThreshold: 500 },
            { id: 14, name: "Boulderback", nextEvolutionId: 15, evolutionXpThreshold: 2000 },
            { id: 15, name: "Mountainous", nextEvolutionId: null, evolutionXpThreshold: null },
            // 6. Cyber
            { id: 16, name: "Bit", nextEvolutionId: 17, evolutionXpThreshold: 500 },
            { id: 17, name: "Byte", nextEvolutionId: 18, evolutionXpThreshold: 2000 },
            { id: 18, name: "Megahertz", nextEvolutionId: null, evolutionXpThreshold: null },
            // 7. Cosmic
            { id: 19, name: "Starlet", nextEvolutionId: 20, evolutionXpThreshold: 500 },
            { id: 20, name: "Orbitron", nextEvolutionId: 21, evolutionXpThreshold: 2000 },
            { id: 21, name: "Galaxia", nextEvolutionId: null, evolutionXpThreshold: null },
            // 8. Ghost
            { id: 22, name: "Spook", nextEvolutionId: 23, evolutionXpThreshold: 500 },
            { id: 23, name: "Phantom", nextEvolutionId: 24, evolutionXpThreshold: 2000 },
            { id: 24, name: "Poltergeist", nextEvolutionId: null, evolutionXpThreshold: null },
            // 9. Ice
            { id: 25, name: "Frostbite", nextEvolutionId: 26, evolutionXpThreshold: 500 },
            { id: 26, name: "Glacier", nextEvolutionId: 27, evolutionXpThreshold: 2000 },
            { id: 27, name: "Avalanche", nextEvolutionId: null, evolutionXpThreshold: null },
            // 10. Dragon
            { id: 28, name: "Wyrmling", nextEvolutionId: 29, evolutionXpThreshold: 500 },
            { id: 29, name: "Drake", nextEvolutionId: 30, evolutionXpThreshold: 2000 },
            { id: 30, name: "Dragonite", nextEvolutionId: null, evolutionXpThreshold: null },
            // 11. Steel
            { id: 31, name: "Scrap", nextEvolutionId: 32, evolutionXpThreshold: 500 },
            { id: 32, name: "Metalclad", nextEvolutionId: 33, evolutionXpThreshold: 2000 },
            { id: 33, name: "Titanium", nextEvolutionId: null, evolutionXpThreshold: null },
            // 12. Poison
            { id: 34, name: "Smog", nextEvolutionId: 35, evolutionXpThreshold: 500 },
            { id: 35, name: "Toxic", nextEvolutionId: 36, evolutionXpThreshold: 2000 },
            { id: 36, name: "Hazmat", nextEvolutionId: null, evolutionXpThreshold: null },
            // 13. Flying
            { id: 37, name: "Breeze", nextEvolutionId: 38, evolutionXpThreshold: 500 },
            { id: 38, name: "Gale", nextEvolutionId: 39, evolutionXpThreshold: 2000 },
            { id: 39, name: "Hurricane", nextEvolutionId: null, evolutionXpThreshold: null },
            // 14. Bug
            { id: 40, name: "Grub", nextEvolutionId: 41, evolutionXpThreshold: 500 },
            { id: 41, name: "Chrysalis", nextEvolutionId: 42, evolutionXpThreshold: 2000 },
            { id: 42, name: "Swarm", nextEvolutionId: null, evolutionXpThreshold: null },
            // 15. Fighting
            { id: 43, name: "Scrapper", nextEvolutionId: 44, evolutionXpThreshold: 500 },
            { id: 44, name: "Brawler", nextEvolutionId: 45, evolutionXpThreshold: 2000 },
            { id: 45, name: "Champion", nextEvolutionId: null, evolutionXpThreshold: null },
            // 16. Psychic
            { id: 46, name: "Mind", nextEvolutionId: 47, evolutionXpThreshold: 500 },
            { id: 47, name: "Brain", nextEvolutionId: 48, evolutionXpThreshold: 2000 },
            { id: 48, name: "Cortex", nextEvolutionId: null, evolutionXpThreshold: null },
            // 17. Fairy
            { id: 49, name: "Pixie", nextEvolutionId: 50, evolutionXpThreshold: 500 },
            { id: 50, name: "Sprite", nextEvolutionId: 51, evolutionXpThreshold: 2000 },
            { id: 51, name: "Archfey", nextEvolutionId: null, evolutionXpThreshold: null }
        ];

        function getPomoData(id) {
            return POMODEX.find(p => p.id === id);
        }

        let currentUserUid = null;
        let activeMonsterDocId = null;
        let currentPomoId = null; 
        let currentHP = 100;
        let timeLeft = 25 * 60;
        let isRunning = false;
        let timerInterval;
        let rosterData = [];
        let selectedMonsterDocId = null;

        // UI Selectors
        const spriteRenderer = document.getElementById('sprite-renderer');
        const timerDisplay = document.getElementById('timer');
        const hpFill = document.getElementById('hp-fill');
        const hpText = document.getElementById('hp-text');

        // --- AUTH & ECOSYSTEM ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('login-section').style.display = 'none';
                checkPlayerEcosystem(user.uid);
            }
        });

        async function checkPlayerEcosystem(uid) {
            const snap = await getDoc(doc(db, "players", uid));
            if (snap.exists() && snap.data().active_pomomon_id) {
                activeMonsterDocId = snap.data().active_pomomon_id;
                showArena();
            } else {
                document.getElementById('egg-selection').style.display = 'block';
                document.getElementById('nav-bar').style.display = 'none';
                document.getElementById('game-section').style.display = 'none';
            }
        }

        window.claimStarter = async (starterId) => {
            const newMonster = { pomodexId: starterId, hp: 100, xp: 0 };
            const docRef = await addDoc(collection(db, "players", currentUserUid, "roster"), newMonster);
            await setDoc(doc(db, "players", currentUserUid), { active_pomomon_id: docRef.id });
            
            activeMonsterDocId = docRef.id;
            document.getElementById('egg-selection').style.display = 'none';
            showArena();
        };

        function showArena() {
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('game-section').style.display = 'block';
            document.getElementById('farm-section').style.display = 'none';
            initMonster();
        }

        async function initMonster() {
            const snap = await getDoc(doc(db, "players", currentUserUid, "roster", activeMonsterDocId));
            if(snap.exists()){
                const data = snap.data();
                
                // BUGFIX: Handle legacy firebase data that didn't have a numeric pomodexId
                currentHP = data.hp !== undefined ? data.hp : 100;
                currentPomoId = data.pomodexId || 1; 
                
                const pomoMeta = getPomoData(currentPomoId) || getPomoData(1);

                updateHPDisplay();
                spriteRenderer.innerHTML = `
                    <div id="active-sprite-img" class="sprite-viewport"></div>
                    <div style="font-weight:bold; color:var(--neon-green); margin-top:5px;">${pomoMeta.name} (Lv. ${data.xp || 0} XP)</div>
                `;
                setPomomonState('idle'); // Initialize the dynamic sprite
            }
        }

        // --- DYNAMIC SPRITE ENGINE ---
        function setPomomonState(stateName) {
            const spriteDiv = document.getElementById('active-sprite-img');
            if (!spriteDiv || !currentPomoId) return;

            // BUGFIX: Strictly enforce lowercase to respect GitHub Pages (Linux) file system
            // BUGFIX: Directly use the stateName without mapping to 'action1'
            const fileName = `pomomon${currentPomoId}_${stateName}_strip.png`.toLowerCase();
            spriteDiv.style.backgroundImage = `url('${fileName}')`;

            // Adjust animation rules dynamically
            if (stateName === 'attack') {
                spriteDiv.style.animation = 'play-sprite 0.6s steps(4) 1 forwards';
            } else {
                spriteDiv.style.animation = 'play-sprite 0.8s steps(4) infinite';
            }
        }

        // Update UI when timer input changes manually
        document.getElementById('time-input').addEventListener('input', (e) => {
            if (!isRunning) {
                let mins = parseInt(e.target.value);
                if (isNaN(mins) || mins < 1) mins = 25;
                timeLeft = mins * 60;
                updateTimerUI();
            }
        });

        // --- TIMER & GAMEPLAY LOGIC ---
        document.getElementById('start-btn').onclick = () => {
            if (isRunning) return;
            if (currentHP <= 0) return alert("Your Pomo-mon is fainted! Heal it in the Farm.");
            
            // BUGFIX: Grab the current value from the custom timer input box just before starting
            let focusMins = parseInt(document.getElementById('time-input').value);
            if (isNaN(focusMins) || focusMins < 1) focusMins = 25;
            timeLeft = focusMins * 60;

            isRunning = true;
            setPomomonState('walk');
            document.getElementById('start-btn').innerText = "FOCUSING...";
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) completeSession();
            }, 1000);
        };

        document.getElementById('give-up-btn').onclick = async () => {
            if (!isRunning) return;
            if (confirm("If you give up, your Pomo-mon will take 20 damage. Continue?")) {
                clearInterval(timerInterval);
                isRunning = false;
                currentHP = Math.max(0, currentHP - 20);
                updateHPDisplay();
                setPomomonState('idle');
                await updateDoc(doc(db, "players", currentUserUid, "roster", activeMonsterDocId), { hp: currentHP });
                resetSession();
                alert("Session abandoned. Pomo-mon took 20 damage.");
            }
        };

        function completeSession() {
            clearInterval(timerInterval);
            setPomomonState('attack'); // Now correctly matches your "attack" filenames
            
            setTimeout(async () => {
                alert("Session Complete! +50 XP");
                
                await updateDoc(doc(db, "players", currentUserUid, "roster", activeMonsterDocId), { xp: increment(50) });
                await checkEvolution(activeMonsterDocId);
                
                resetSession();
            }, 600);
        }

        // --- EVOLUTION ENGINE ---
        async function checkEvolution(docId) {
            const snap = await getDoc(doc(db, "players", currentUserUid, "roster", docId));
            if(!snap.exists()) return;
            
            const data = snap.data();
            const pomoMeta = getPomoData(data.pomodexId);

            if (pomoMeta.nextEvolutionId && data.xp >= pomoMeta.evolutionXpThreshold) {
                const evolvedPomo = getPomoData(pomoMeta.nextEvolutionId);
                
                alert(`WHAT? ${pomoMeta.name} is evolving!\n\n✨ YOUR POMO-MON EVOLVED INTO ${evolvedPomo.name.toUpperCase()}! ✨`);
                
                await updateDoc(doc(db, "players", currentUserUid, "roster", docId), {
                    pomodexId: evolvedPomo.id
                });
                
                await initMonster();
            }
        }

        function resetSession() {
            isRunning = false;
            let mins = parseInt(document.getElementById('time-input').value);
            if (isNaN(mins) || mins < 1) mins = 25;
            timeLeft = mins * 60;
            document.getElementById('start-btn').innerText = "Start Session";
            setPomomonState('idle');
            updateTimerUI();
        }

        // --- GBA FARM LOGIC ---
        async function loadFarm() {
            const grid = document.getElementById('gba-grid');
            grid.innerHTML = '';
            const snap = await getDocs(collection(db, "players", currentUserUid, "roster"));
            rosterData = [];
            snap.forEach(d => rosterData.push({ docId: d.id, ...d.data() }));

            // Generate 30 cells (5x6)
            for (let i = 0; i < 30; i++) {
                const cell = document.createElement('div');
                cell.className = 'gba-cell';
                if (rosterData[i]) {
                    // BUGFIX: Added fallback so legacy Firebase records don't crash the grid
                    let safeId = rosterData[i].pomodexId || 1; 
                    const pData = getPomoData(safeId) || getPomoData(1);
                    
                    cell.innerHTML = `<div class="gba-mini-sprite" style="background-image: url('pomomon${pData.id}_idle_strip.png');"></div>`;
                    cell.onclick = () => selectMonster(rosterData[i], pData, cell);
                }
                grid.appendChild(cell);
            }
        }

        function selectMonster(rosterEntry, pomoMeta, cellElement) {
            document.querySelectorAll('.gba-cell').forEach(c => c.classList.remove('selected'));
            cellElement.classList.add('selected');
            selectedMonsterDocId = rosterEntry.docId;

            // BUGFIX: Displaying fallback HP if missing
            let displayHp = rosterEntry.hp !== undefined ? rosterEntry.hp : 100;
            let displayXp = rosterEntry.xp !== undefined ? rosterEntry.xp : 0;

            document.getElementById('summary-content').innerHTML = `
                <strong>${pomoMeta.name}</strong><br>
                HP: ${displayHp}/100 | XP: ${displayXp}
            `;
            document.getElementById('gba-equip-btn').style.display = 'block';
        }

        document.getElementById('gba-equip-btn').onclick = async () => {
            if (!selectedMonsterDocId) return;
            await updateDoc(doc(db, "players", currentUserUid), { active_pomomon_id: selectedMonsterDocId });
            activeMonsterDocId = selectedMonsterDocId;
            document.getElementById('nav-arena').click();
        };

        document.getElementById('gba-cancel-btn').onclick = () => {
            document.querySelectorAll('.gba-cell').forEach(c => c.classList.remove('selected'));
            document.getElementById('summary-content').innerText = 'Select a Pomo-mon...';
            document.getElementById('gba-equip-btn').style.display = 'none';
        };

        // --- HELPERS ---
        function updateHPDisplay() {
            hpFill.style.width = currentHP + "%";
            hpText.innerText = `${currentHP} / 100`;
            hpFill.style.background = currentHP < 30 ? "var(--neon-red)" : "var(--neon-green)";
        }

        function updateTimerUI() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        // Visibility Penalty
        window.onblur = async () => {
            if (isRunning) {
                clearInterval(timerInterval);
                currentHP = Math.max(0, currentHP - 15);
                updateHPDisplay();
                setPomomonState('idle');
                await updateDoc(doc(db, "players", currentUserUid, "roster", activeMonsterDocId), { hp: currentHP });
                document.getElementById('penalty-modal').classList.add('active');
            }
        };

        document.getElementById('resume-btn').onclick = () => {
            document.getElementById('penalty-modal').classList.remove('active');
            isRunning = false;
            document.getElementById('start-btn').click();
        };

        // Navigation
        document.getElementById('nav-arena').onclick = () => {
            showArena();
            document.getElementById('nav-arena').classList.add('active');
            document.getElementById('nav-farm').classList.remove('active');
        };

        document.getElementById('nav-farm').onclick = () => {
            if(isRunning) return alert("Finish your focus session first!");
            document.getElementById('game-section').style.display = 'none';
            document.getElementById('farm-section').style.display = 'block';
            document.getElementById('nav-farm').classList.add('active');
            document.getElementById('nav-arena').classList.remove('active');
            loadFarm();
        };

        // Auth Buttons
        document.getElementById('login-btn').onclick = () => {
            const e = document.getElementById('email-input').value;
            const p = document.getElementById('password-input').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };

        document.getElementById('signup-btn').onclick = () => {
            const e = document.getElementById('email-input').value;
            const p = document.getElementById('password-input').value;
            createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };
    </script>
</body>
</html>
